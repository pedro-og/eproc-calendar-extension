<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eProc Calendar - Settings</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
      width: 280px;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1a1a2e;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      color: #444;
    }

    .hint {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      color: #333;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus {
      border-color: #4a90e2;
    }

    .color-picker {
      position: relative;
      width: 100%;
    }

    .color-picker-selected {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      color: #333;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .color-picker-selected:hover {
      border-color: #4a90e2;
    }

    .color-picker-selected::after {
      content: '';
      margin-left: auto;
      border: 4px solid transparent;
      border-top: 5px solid #666;
    }

    .color-picker.open .color-picker-selected::after {
      border-top: none;
      border-bottom: 5px solid #666;
    }

    .color-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .color-picker-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-top: 2px;
      z-index: 10;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .color-picker.open .color-picker-dropdown {
      display: block;
    }

    .color-picker-option {
      padding: 7px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #333;
    }

    .color-picker-option:hover {
      background: #f0f0f0;
    }

    .color-picker-option.selected {
      background: #e8f0fe;
    }

    button#save {
      width: 100%;
      padding: 9px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    button#save:hover {
      background: #357abd;
    }

    h2 {
      font-size: 13px;
      font-weight: 700;
      margin-top: 16px;
      margin-bottom: 10px;
      color: #1a1a2e;
      padding-bottom: 6px;
      border-bottom: 2px solid #4a90e2;
    }

    h2:first-of-type {
      margin-top: 0;
    }

    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #2e7d32;
      min-height: 18px;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
      color: #444;
      cursor: pointer;
    }

    .toggle-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #4a90e2;
    }

    .tag-input-container {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      min-height: 34px;
      cursor: text;
      transition: border-color 0.15s;
    }

    .tag-input-container:focus-within {
      border-color: #4a90e2;
    }

    .tag-input-container input {
      border: none;
      outline: none;
      font-size: 13px;
      flex: 1;
      min-width: 80px;
      padding: 2px 0;
      color: #333;
    }

    .email-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 12px;
      max-width: 100%;
      word-break: break-all;
    }

    .email-tag .tag-remove {
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      color: #5f6368;
      font-weight: 600;
      margin-left: 2px;
    }

    .email-tag .tag-remove:hover {
      color: #c62828;
    }
  </style>
</head>
<body>
  <h1>📅 eProc Calendar</h1>

  <h2>Audiências</h2>
  <div class="field">
    <label for="audienciasOffset">Antecedência (dias)</label>
    <p class="hint">Cria o evento N dias antes da audiência</p>
    <input type="number" id="audienciasOffset" min="0" max="30" value="0">
  </div>

  <div class="field">
    <label>Cor</label>
    <div class="color-picker" id="audienciasColor"></div>
  </div>

  <div class="field">
    <label class="toggle-label">
      <input type="checkbox" id="audienciasOpenTab">
      Abrir Calendar após criação
    </label>
  </div>

  <div class="field">
    <label>Convidados</label>
    <p class="hint">Emails que receberão convite do evento</p>
    <div class="tag-input-container" id="audienciasGuestsContainer">
      <input type="email" id="audienciasGuestsInput" placeholder="email@exemplo.com">
    </div>
  </div>

  <h2>Prazos</h2>
  <div class="field">
    <label for="processosOffset">Antecedência (dias)</label>
    <p class="hint">Cria o evento N dias antes do prazo final</p>
    <input type="number" id="processosOffset" min="0" max="30" value="0">
  </div>

  <div class="field">
    <label>Cor</label>
    <div class="color-picker" id="processosColor"></div>
  </div>

  <div class="field">
    <label class="toggle-label">
      <input type="checkbox" id="processosOpenTab">
      Abrir Calendar após criação
    </label>
  </div>

  <div class="field">
    <label>Convidados</label>
    <p class="hint">Emails que receberão convite do evento</p>
    <div class="tag-input-container" id="processosGuestsContainer">
      <input type="email" id="processosGuestsInput" placeholder="email@exemplo.com">
    </div>
  </div>

  <button id="save">Salvar</button>
  <div id="status"></div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
